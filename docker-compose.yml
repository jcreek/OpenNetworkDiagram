services:
  open-network-diagram:
    build:
      context: .
      dockerfile: Dockerfile
    image: open-network-diagram:local
    ports:
      - "8080:3000"
    volumes:
      - ./data:/app/data
    environment:
      NETWORK_DATA_FILE: "/app/data/network.json"
      NETWORK_BACKUP_DIR: "/app/data/.backups"
    restart: unless-stopped
